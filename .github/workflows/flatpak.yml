name: Flatpak Build & Sign

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Setup Flathub (user)
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK
        run: |
          set -e
          flatpak install --user -y flathub org.freedesktop.Sdk//23.08
          flatpak install --user -y flathub org.freedesktop.Platform//23.08

      - name: Import GPG key (CI-safe)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEYID=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^fpr:/ {print $10; exit}')

          if [ -z "$KEYID" ]; then
            echo "ERROR: KEYID not found"
            exit 1
          fi

          echo "KEYID=$KEYID" >> $GITHUB_ENV

          # export public key for OSTree signing
          gpg --armor --export "$KEYID" > repo-signing.key

      - name: Build Flatpak
        run: |
          set -e

          flatpak-builder \
            --repo=repo \
            --force-clean \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      - name: Update repo + sign (OSTree compatible)
        run: |
          set -e

          export GNUPGHOME=$HOME/.gnupg

          flatpak build-update-repo \
            --gpg-import=repo-signing.key \
            --gpg-sign="$KEYID" \
            repo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
