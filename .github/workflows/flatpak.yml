name: Flatpak CI (Flathub Ready)

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLATPAK_USER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # SYSTEM DEPENDENCIES
      # -------------------------
      - name: Install system tools
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      # -------------------------
      # FLATHUB SETUP (USER ONLY)
      # -------------------------
      - name: Setup Flathub (user)
        run: |
          set -e
          flatpak --user remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      # -------------------------
      # INSTALL RUNTIME + SDK
      # -------------------------
      - name: Install SDK
        run: |
          set -e
          flatpak --user install -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      # -------------------------
      # VERIFY
      # -------------------------
      - name: Verify SDK
        run: |
          flatpak info org.freedesktop.Sdk//24.08
          flatpak info org.freedesktop.Platform//24.08

      # -------------------------
      # BUILD FLATPAK
      # -------------------------
      - name: Build Flatpak
        run: |
          set -e
          flatpak-builder \
            --force-clean \
            --user \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      # -------------------------
      # EXPORT REPO (NO GPG YET = SAFE MODE)
      # -------------------------
      - name: Build repo
        run: |
          set -e
          flatpak build-update-repo repo

      # -------------------------
      # ARTIFACT
      # -------------------------
      - name: Upload repo
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
