name: Flatpak Build & Sign

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEYID=$(gpg --list-secret-keys --keyid-format LONG \
            | awk '/sec/ {split($2,a,"/"); print a[2]; exit}')

          echo "KEYID=$KEYID" >> $GITHUB_ENV

      - name: Build Flatpak
        run: |
          set -e

          flatpak-builder \
            --repo=repo \
            --force-clean \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      - name: Update repo
        run: |
          set -e
          flatpak build-update-repo repo

      - name: Sign repo
        run: |
          set -e
          flatpak build-sign repo "$KEYID"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
