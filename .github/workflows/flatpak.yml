name: Flatpak Build & Sign

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Add Flathub remote
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Setup GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          # récupération du KEYID (PAS fingerprint)
          KEYID=$(gpg --list-secret-keys --keyid-format LONG | awk '/sec/ {split($2,a,"/"); print a[2]; exit}')

          echo "KEYID=$KEYID" >> $GITHUB_ENV
          echo "Using KEYID: $KEYID"

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir io.github.blacksamdev.Popcorn.json

      - name: Update repo metadata
        run: |
          flatpak build-update-repo repo

      - name: Sign Flatpak repo
        run: |
          flatpak build-sign repo "$KEYID"

      - name: Export signed repo
        run: |
          tar -czf repo.tar.gz repo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo.tar.gz
