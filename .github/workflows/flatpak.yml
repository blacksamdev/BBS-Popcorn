name: Build and publish Flatpak repo

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Setup Flatpak (user mode)
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo || true

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean \
            --user \
            --install-deps-from=flathub \
            --repo=repo \
            build-dir io.github.blacksamdev.Popcorn.json

      - name: Copy flatpakrepo file
        run: cp bbs-popcorn.flatpakrepo repo/ || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
