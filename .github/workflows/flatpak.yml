name: Flatpak CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg findutils

      - name: Setup Flathub
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK 24.08
        run: |
          set -e
          flatpak install --user -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Clean workspace
        run: |
          set -e
          rm -rf build-dir repo
          mkdir repo

      - name: Build Flatpak (STRICT CHECK)
        run: |
          set -e
          flatpak-builder --user --force-clean \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

          echo "Checking repo content:"
          ls -R repo

          test -f repo/summary

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo

      - name: Verify artifact
        run: |
          set -e
          echo "Downloaded repo:"
          ls -R repo
          test -f repo/summary

      - name: Deploy
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin gh-pages || true
          git checkout --orphan gh-pages

          rm -rf *

          cp -r repo/. .

          git add -A
          git commit -m "Update Flatpak repo" || echo "No changes"
          git push -f origin gh-pages
