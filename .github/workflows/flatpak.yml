name: Flatpak CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir io.github.blacksamdev.Popcorn.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo

      - name: Deploy to gh-pages
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin gh-pages || true

          git checkout --orphan gh-pages

          rm -rf *

          if [ ! -d repo ] || [ -z "$(ls -A repo)" ]; then
            echo "ERROR: repo missing"
            exit 1
          fi

          cp -r repo/. .

          git add .

          git commit -m "Update Flatpak repo"

          git push -f origin gh-pages
