name: Flatpak CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg rsync findutils

      - name: Setup Flathub
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK 24.08
        run: |
          set -e
          flatpak install --user -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      - name: Prepare workspace
        run: |
          set -e
          rm -rf build-dir repo
          mkdir -p repo

      - name: Build Flatpak
        run: |
          set -e
          flatpak-builder --user --force-clean \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      - name: Verify repo
        run: |
          set -e
          echo "Repo content:"
          ls -R repo
          test -f repo/summary

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo

      - name: Debug workspace
        run: |
          set -e
          echo "Workspace:"
          ls -R

      - name: Deploy to gh-pages
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git fetch origin gh-pages || true
          git checkout --orphan gh-pages

          rm -rf *

          # 🔧 FIX FINAL : on ne dépend PLUS de artifact/, on utilise repo direct
          if [ ! -f repo/summary ]; then
            echo "ERROR: Flatpak repo missing"
            exit 1
          fi

          echo "Deploying Flatpak repo..."
          cp -r repo/. .

          git add -A
          git commit -m "Update Flatpak repo" || echo "No changes"
          git push -f origin gh-pages
