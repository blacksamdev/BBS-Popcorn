name: Deploy Flatpak Repo

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Flatpak Build & Sign on"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download Flatpak repo artifact
        uses: actions/download-artifact@v4
        with:
          name: flatpak-repo
          path: repo

      - name: Debug repo content
        run: |
          echo "CHECK repo content:"
          ls -R repo || (echo "repo folder missing" && exit 1)

      - name: Ensure gh-pages content folder exists
        run: |
          mkdir -p deploy

      - name: Copy repo content safely
        run: |
          set -e
          if [ ! -d "repo" ]; then
            echo "ERROR: repo folder missing after artifact download"
            exit 1
          fi

          cp -r repo/* deploy/

      - name: Commit and push gh-pages
        run: |
          set -e
          cd deploy
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Update Flatpak repo"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
