name: Flatpak Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLATPAK_BRANCH: "24.08"

    steps:
      # ----------------------------
      # SOURCE
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # SYSTEM DEPENDENCIES
      # ----------------------------
      - name: Install system deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      # ----------------------------
      # FLATHUB SETUP
      # ----------------------------
      - name: Setup Flathub
        run: |
          set -e
          flatpak remote-add --system --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      # ----------------------------
      # FORCE CLEAN STATE (important for reviewers)
      # ----------------------------
      - name: Clean Flatpak state
        run: |
          set -e
          rm -rf ~/.local/share/flatpak || true
          rm -rf ~/.cache/flatpak || true

      # ----------------------------
      # INSTALL SDK (PINNED 24.08)
      # ----------------------------
      - name: Install Flatpak SDK 24.08
        run: |
          set -e

          flatpak install --system -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Platform.GL.default//24.08

      # ----------------------------
      # VERIFY (mandatory for CI clarity)
      # ----------------------------
      - name: Verify runtime
        run: |
          set -e
          flatpak info org.freedesktop.Sdk//24.08
          flatpak info org.freedesktop.Platform//24.08

      # ----------------------------
      # GPG SETUP (ROBUST + NO GPGME FAILS)
      # ----------------------------
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e

          export GNUPGHOME=$HOME/.gnupg
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEYID=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^fpr:/ {print $10; exit}')

          test -n "$KEYID"

          echo "KEYID=$KEYID" >> $GITHUB_ENV

          gpg --armor --export "$KEYID" > repo-signing.key

      # ----------------------------
      # BUILD (REPRODUCIBLE)
      # ----------------------------
      - name: Build Flatpak
        run: |
          set -e

          flatpak-builder \
            --force-clean \
            --disable-cache \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      # ----------------------------
      # SIGN REPO (FLATHUB EXPECTED FORMAT)
      # ----------------------------
      - name: Sign repository
        run: |
          set -e

          export GNUPGHOME=$HOME/.gnupg

          flatpak build-update-repo repo \
            --gpg-import=repo-signing.key \
            --gpg-sign="$KEYID"

      # ----------------------------
      # ARTIFACT
      # ----------------------------
      - name: Upload repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
