name: Flatpak CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FLATPAK_BRANCH: "24.08"
      FLATPAK_OPTS: "--user -y"

    steps:
      # ----------------------------
      # SOURCE
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------
      # SYSTEM DEPENDENCIES
      # ----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      # ----------------------------
      # FLATPAK USER SETUP (IMPORTANT: NO --system)
      # ----------------------------
      - name: Setup Flathub (user only)
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      # ----------------------------
      # CLEAN ENV (avoid stale runtime issues)
      # ----------------------------
      - name: Clean Flatpak cache
        run: |
          set -e
          rm -rf ~/.local/share/flatpak || true
          rm -rf ~/.cache/flatpak || true

      # ----------------------------
      # INSTALL RUNTIME + SDK (PINNED 24.08)
      # ----------------------------
      - name: Install SDK 24.08
        run: |
          set -e

          flatpak install $FLATPAK_OPTS flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Platform.GL.default//24.08

      # ----------------------------
      # VERIFY (mandatory for Flathub review traceability)
      # ----------------------------
      - name: Verify runtime
        run: |
          set -e
          flatpak info org.freedesktop.Sdk//24.08
          flatpak info org.freedesktop.Platform//24.08

      # ----------------------------
      # GPG IMPORT (CI-safe, no GPGME failure mode)
      # ----------------------------
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e

          export GNUPGHOME=$HOME/.gnupg
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEYID=$(gpg --list-secret-keys --with-colons \
            | awk -F: '/^fpr:/ {print $10; exit}')

          test -n "$KEYID"

          echo "KEYID=$KEYID" >> $GITHUB_ENV

          gpg --armor --export "$KEYID" > repo-signing.key

      # ----------------------------
      # FLATPAK BUILD (REPRODUCIBLE MODE)
      # ----------------------------
      - name: Build Flatpak
        run: |
          set -e

          flatpak-builder \
            --force-clean \
            --disable-cache \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      # ----------------------------
      # SIGN REPOSITORY (FLATHUB EXPECTED OSTREE FORMAT)
      # ----------------------------
      - name: Sign repo
        run: |
          set -e

          export GNUPGHOME=$HOME/.gnupg

          flatpak build-update-repo repo \
            --gpg-import=repo-signing.key \
            --gpg-sign="$KEYID"

      # ----------------------------
      # ARTIFACT (review/debug only)
      # ----------------------------
      - name: Upload repo
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
