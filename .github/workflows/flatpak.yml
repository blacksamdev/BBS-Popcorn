name: Flatpak CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # SYSTEM DEPENDENCIES
      # ----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      # ----------------------------
      # FLATHUB SETUP
      # ----------------------------
      - name: Setup Flathub
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      # ----------------------------
      # INSTALL SDK 24.08 (IMPORTANT FIX)
      # ----------------------------
      - name: Install SDK
        run: |
          set -e
          flatpak install --user -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08

      # ----------------------------
      # BUILD FLATPAK
      # ----------------------------
      - name: Build Flatpak
        run: |
          set -e

          mkdir -p repo

          flatpak-builder --user --force-clean \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      # ----------------------------
      # VERIFY OUTPUT (important debug safety)
      # ----------------------------
      - name: Check repo content
        run: |
          set -e
          ls -la repo

      # ----------------------------
      # UPLOAD ARTIFACT
      # ----------------------------
      - name: Upload Flatpak repo
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo

deploy:
  needs: build
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: flatpak-repo
        path: repo

    - name: Debug downloaded artifact
      run: ls -la repo

    - name: Deploy
      run: |
        set -e

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git fetch origin gh-pages || true
        git checkout --orphan gh-pages

        rm -rf *

        test -d repo

        cp -r repo/. .

        git add .
        git commit -m "Update Flatpak repo"
        git push -f origin gh-pages
