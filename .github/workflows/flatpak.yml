name: Flatpak Build & Sign

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      - name: Setup Flathub
        run: |
          set -e
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install SDK
        run: |
          set -e
          flatpak install --user -y flathub org.freedesktop.Sdk//23.08
          flatpak install --user -y flathub org.freedesktop.Platform//23.08

      - name: Import + TRUST GPG key (IMPORTANT FIX)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEYID=$(gpg --list-secret-keys --keyid-format LONG \
            | awk '/sec/ {split($2,a,"/"); print a[2]; exit}')

          echo "KEYID=$KEYID" >> $GITHUB_ENV

          # IMPORTANT: trust key for signing
          echo -e "5\ny\n" | gpg --batch --command-fd 0 --edit-key "$KEYID" trust quit

      - name: Build Flatpak
        run: |
          set -e
          flatpak-builder \
            --repo=repo \
            --force-clean \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      - name: Sign repository
        run: |
          set -e

          flatpak build-update-repo \
            --gpg-sign="$KEYID" \
            repo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
