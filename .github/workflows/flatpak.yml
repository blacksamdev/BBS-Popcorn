name: Flatpak CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # CHECKOUT
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # SYSTEM DEPENDENCIES
      # ----------------------------
      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder gnupg

      # ----------------------------
      # FLATHUB SETUP (USER ONLY)
      # ----------------------------
      - name: Setup Flathub
        run: |
          set -e

          flatpak --user remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo

          flatpak --user update --appstream flathub || true

      # ----------------------------
      # INSTALL SDK + RUNTIME 24.08
      # ----------------------------
      - name: Install Flatpak SDK
        run: |
          set -e

          flatpak --user install -y flathub \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Platform.GL.default//24.08

      # ----------------------------
      # VERIFY ENVIRONMENT
      # ----------------------------
      - name: Verify Flatpak setup
        run: |
          set -e
          flatpak info org.freedesktop.Sdk//24.08
          flatpak info org.freedesktop.Platform//24.08
          flatpak remotes --user
          flatpak list --user

      # ----------------------------
      # BUILD FLATPAK
      # ----------------------------
      - name: Build Flatpak
        run: |
          set -e

          flatpak-builder \
            --force-clean \
            --user \
            --disable-cache \
            --repo=repo \
            build-dir \
            io.github.blacksamdev.Popcorn.json

      # ----------------------------
      # EXPORT REPO (NO SIGNING REQUIRED FOR CI VALIDATION)
      # ----------------------------
      - name: Export repository
        run: |
          set -e
          flatpak build-update-repo repo

      # ----------------------------
      # ARTIFACT OUTPUT
      # ----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-repo
          path: repo
